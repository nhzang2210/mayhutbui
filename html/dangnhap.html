<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập</title>

<link rel="stylesheet" href="../css/bootstrap.min.css">

<style>
body {
    background: #f5f5f5;
}

/* HEADER giống trang chủ */
.header {
    background: #d70018;
    padding: 15px 40px;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

/* LOGIN BOX */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.login-box {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* TITLE */
.login-title {
    text-align: center;
    color: #d70018;
    font-weight: bold;
    margin-bottom: 20px;
}

/* INPUT */
.form-control {
    border-radius: 8px;
    padding: 10px;
}

/* BUTTON */
.btn-login {
    background: #d70018;
    color: white;
    font-weight: bold;
    border-radius: 8px;
}

.btn-login:hover {
    background: #b80014;
}

/* LINK */
.register-link {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    🛒 Máy Hút Bụi
</div>

<!-- LOGIN -->
<div class="login-container">
    <div class="login-box">

        <h4 class="login-title">Đăng nhập tài khoản</h4>

        <div class="mb-3">
            <input type="text" id="email" class="form-control" placeholder="Nhập email">
        </div>

        <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
        </div>

        <button onclick="login()" class="btn btn-login w-100">
            Đăng nhập
        </button>

        <div class="register-link">
            <a href="dangky.html">Chưa có tài khoản? Đăng ký</a>
        </div>

    </div>
</div>

<!-- SCRIPT LOGIN -->
<script>
async function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Nhập đầy đủ thông tin!");
        return;
    }

    try {
        let res = await fetch("http://localhost:3000/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        let data = await res.json();

        if (data.user) {

            localStorage.setItem("user", JSON.stringify({
    name: data.user.name,
    email: data.user.email
}));

            alert("Đăng nhập thành công!");

            if (data.user.role === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "../index.html";
            }

        } else {
            alert(data.message || "Sai tài khoản!");
        }

    } catch (err) {
        alert("Không kết nối server!");
        console.log(err);
    }
}
</script>

</body>
</html>
