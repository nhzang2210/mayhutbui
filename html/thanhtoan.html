<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán - Máy Hút Bụi</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary: #d70018; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        .cart-card, .summary-box { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .checkout-popup { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display:none; justify-content:center; align-items:center; z-index:9999; }
        .checkout-content { background:white; padding:25px; width:450px; border-radius:20px; position: relative; max-height: 90vh; overflow-y: auto; }
        .back-home { font-size: 18px; font-weight: 600; text-decoration: none; color: #333; transition: 0.3s; display: flex; align-items: center; cursor: pointer; }
        .back-home:hover { color: var(--primary); transform: translateX(-5px); }
        .payment-box { background: #fff9f9; border: 1px dashed #d70018; border-radius: 10px; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="../index.html" class="back-home">
            <i class="bi bi-arrow-left-circle-fill me-2" style="font-size: 1.5rem;"></i> QUAY VỀ TRANG CHỦ
        </a>
        <h2 class="fw-bold mb-0">Xác Nhận Đơn Hàng</h2>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="cart-card p-4">
                <h5 class="fw-bold mb-4 border-bottom pb-2">Danh sách sản phẩm</h5>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Giá</th>
                                <th class="text-center">Số lượng</th>
                                <th class="text-end">Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="summary-box p-4 text-center">
                <p class="text-muted mb-1">Tổng cộng thanh toán</p>
                <h2 class="fw-bold text-danger mb-4" id="final-total">0đ</h2>
                <button onclick="openCheckout()" class="btn btn-danger w-100 py-3 fw-bold rounded-pill shadow">
                    TIẾN HÀNH ĐẶT HÀNG
                </button>
            </div>
        </div>
    </div>
</div>

<div id="checkout-popup" class="checkout-popup">
    <div class="checkout-content">
        <span class="btn-close position-absolute end-0 top-0 m-3" style="cursor:pointer" onclick="closeCheckout()"></span>
        <h4 class="fw-bold text-center mb-3 text-danger">🛒 THÔNG TIN GIAO HÀNG</h4>
        
        <div class="mb-2">
            <label class="small fw-bold">HỌ TÊN</label>
            <input class="form-control p-2" id="name" placeholder="Tên người nhận">
        </div>
        
        <div class="mb-2">
            <label class="small fw-bold">SỐ ĐIỆN THOẠI</label>
            <input class="form-control p-2" id="phone" placeholder="Số điện thoại">
        </div>

        <div class="mb-2">
            <label class="small fw-bold">EMAIL</label>
            <input class="form-control p-2" id="email" placeholder="Email (nếu có)">
        </div>
        
        <div class="mb-3">
            <label class="small fw-bold">ĐỊA CHỈ</label>
            <input class="form-control p-2" id="address" placeholder="Địa chỉ giao hàng">
        </div>

        <div class="mb-3">
            <label class="small fw-bold">PHƯƠNG THỨC THANH TOÁN</label>
            <select class="form-select p-2" id="payment-method" onchange="togglePaymentBox()">
                <option value="cod">Tiền mặt khi nhận hàng (COD)</option>
                <option value="bank">Chuyển khoản / Quét mã QR</option>
            </select>
        </div>

        <div id="payment-box" class="payment-box text-center">
            <p class="small mb-1 fw-bold text-dark">NGÂN HÀNG TECHCOMBANK</p>
            <img id="qr-img" src="" alt="QR Thanh toán" style="width: 150px; border-radius: 10px;">
            <p class="mb-0 mt-1" style="font-size: 10px; color: #555;">Nội dung: ThanhToanDonHang</p>
        </div>

        <button onclick="placeOrder()" id="btn-submit" class="btn btn-danger w-100 py-3 mt-3 fw-bold rounded-3 shadow">XÁC NHẬN ĐẶT HÀNG</button>
    </div>
</div>

<script>
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let tbody = document.getElementById('cart-items-table-body');
        tbody.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
            let p = parseInt(item.price.toString().replace(/\D/g, "")) || 0;
            let sub = p * (item.quantity || 1);
            total += sub;

            tbody.innerHTML += `
                <tr>
                    <td><div class="fw-bold text-truncate" style="max-width: 200px;">${item.title}</div></td>
                    <td>${p.toLocaleString()}đ</td>
                    <td class="text-center">
                        <input type="number" value="${item.quantity}" min="1" class="form-control form-control-sm d-inline-block text-center" style="width: 55px;" onchange="updateQty(${index}, this.value)">
                    </td>
                    <td class="text-end">
                        <i class="bi bi-trash3-fill text-danger" style="cursor:pointer" onclick="removeItem(${index})"></i>
                    </td>
                </tr>`;
        });
        document.getElementById('final-total').innerText = total.toLocaleString() + "đ";
    }

    function togglePaymentBox() {
        let method = document.getElementById("payment-method").value;
        let box = document.getElementById("payment-box");
        let total = document.getElementById('final-total').innerText.replace(/\D/g, "");
        
        if (method === "bank") {
            box.style.display = "block";
            // Cập nhật QR theo Techcombank của bạn với số tiền động
            document.getElementById("qr-img").src = `https://img.vietqr.io/image/TCB-0843176079-compact2.png?amount=${total}&addInfo=ThanhToanDonHang`;
        } else {
            box.style.display = "none";
        }
    }

    function updateQty(index, val) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart[index].quantity = Math.max(1, parseInt(val));
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function openCheckout() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        if(cart.length === 0) return alert("Giỏ hàng của bạn đang trống!");
        document.getElementById("checkout-popup").style.display = "flex";
        togglePaymentBox(); // Cập nhật QR nếu đang chọn bank
    }

    function closeCheckout() { document.getElementById("checkout-popup").style.display = "none"; }

    async function placeOrder() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let name = document.getElementById("name").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let address = document.getElementById("address").value.trim();
        let email = document.getElementById("email").value.trim() || "khach_le@gmail.com";

        if (!name || !phone || !address) return alert("Vui lòng điền đủ thông tin giao hàng!");

        let cleanedCart = cart.map(i => ({
            id: i.id,
            quantity: i.quantity,
            price: parseInt(i.price.toString().replace(/\D/g, ""))
        }));

        let totalAmount = cleanedCart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

        try {
            let res = await fetch("http://localhost:3000/api/orders", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, phone, address, email, total: totalAmount, cart: cleanedCart })
            });

            if (res.ok) {
                alert("✅ ĐẶT HÀNG THÀNH CÔNG!");
                localStorage.removeItem("cart");
                closeCheckout();
                renderCart();
            } else {
                alert("❌ Không thể tạo đơn hàng. Vui lòng kiểm tra Server!");
            }
        } catch (err) { alert("Lỗi kết nối Server!"); }
    }

    renderCart();
</script>
</body>
</html>
