<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<link rel="stylesheet" href="../css/bootstrap.min.css">

<style>
body {
    background: #f5f5f5;
}

.header {
    background: #d70018;
    padding: 15px 40px;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.register-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.register-box {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.register-title {
    text-align: center;
    color: #d70018;
    font-weight: bold;
    margin-bottom: 20px;
}

.form-control {
    border-radius: 8px;
    padding: 10px;
}

.btn-register {
    background: #d70018;
    color: white;
    font-weight: bold;
    border-radius: 8px;
}

.btn-register:hover {
    background: #b80014;
}

.login-link {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">
    🛒 Máy Hút Bụi
</div>

<div class="register-container">
    <div class="register-box">

        <h4 class="register-title">Tạo tài khoản</h4>

        <div class="mb-2">
    <input type="text" id="name" class="form-control" placeholder="👤Họ tên">
</div>

<div class="mb-2">
    <input type="text" id="phone" class="form-control" placeholder="📱Số điện thoại">
</div>

<div class="mb-2">
    <input type="text" id="email" class="form-control" placeholder="📧Email">
</div>

<div class="mb-2">
    <input type="date" id="dob" class="form-control">
</div>

<div class="mb-3">
    <input type="password" id="password" class="form-control" placeholder="🔐Mật khẩu">
</div>
<div class="mb-3">
    <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu">
</div>

        <button onclick="register()" class="btn btn-register w-100">
            Đăng ký
        </button>

        <div class="login-link">
            <a href="dangnhap.html">Đã có tài khoản? Đăng nhập</a>
        </div>

    </div>
</div>

<script>
async function register() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;
    let dob = document.getElementById("dob").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    // 🔥 kiểm tra rỗng
    if (!name || !phone || !email || !dob || !password || !confirmPassword) {
        alert("Nhập đầy đủ thông tin!");
        return;
    }

    // 🔥 kiểm tra trùng mật khẩu
    if (password !== confirmPassword) {
        alert("Mật khẩu không khớp!");
        return;
    }

    try {
        let res = await fetch("http://localhost:3000/api/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, phone, email, dob, password })
        });

        let result = await res.json();

        alert(result.message);

        if (result.message.includes("thành công")) {
            window.location.href = "dangnhap.html";
        }

    } catch (err) {
        alert("Không kết nối server!");
        console.log(err);
    }
}
</script>

</body>
</html>
